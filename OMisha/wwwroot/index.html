<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Крестики-нолики</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin: 20px auto;
        }

        .cell {
            width: 100px;
            height: 100px;
            border: 2px solid #333;
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            cursor: pointer;
        }

            .cell.X {
                color: red;
            }

            .cell.O {
                color: blue;
            }

            .cell:hover {
                background: #e0e0e0;
            }

        .chat {
            width: 300px;
            margin: 20px auto;
            border: 1px solid #ccc;
            padding: 10px;
        }

        .messages {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            padding: 5px;
            text-align: left;
        }

        .message {
            margin: 5px 0;
            padding: 5px;
        }

            .message.X {
                background: #ffe0e0;
            }

            .message.O {
                background: #e0e0ff;
            }

            .message.Зритель {
                background: #f0f0f0;
                color: #666;
                font-style: italic;
            }

        input, button {
            padding: 5px;
            margin: 5px;
        }

        .status {
            font-size: 20px;
            font-weight: bold;
            margin: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .players {
            font-size: 16px;
            color: #666;
            margin: 10px;
        }

        .debug {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: black;
            color: lime;
            font-size: 12px;
            padding: 10px;
            border-radius: 5px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            text-align: left;
            z-index: 999;
        }

        .error-message {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }

        .spectator-badge {
            background: #ff9800;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .reset-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

            .reset-button:hover {
                background: #0056b3;
            }

            .reset-button.disabled {
                background: #ccc;
                cursor: not-allowed;
            }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
</head>
<body>
    <h1>Крестики-нолики</h1>

    <div id="joinPanel">
        <input type="text" id="roomId" placeholder="ID комнаты" value="game123">
        <button onclick="joinGame()">Войти</button>
        <p>Введите одинаковый ID с другом</p>
        <div id="joinError" class="error-message"></div>
    </div>

    <div id="gamePanel" style="display:none;">
        <div id="spectatorBadge" style="display:none;" class="spectator-badge">👁️ Режим наблюдателя</div>
        <div class="players" id="playersInfo"></div>
        <div class="status" id="status"></div>
        <div id="board" class="board"></div>
        <button id="resetButton" class="reset-button" onclick="resetGame()">Сбросить игру</button>

        <div class="chat">
            <h3>Чат</h3>
            <div id="messages" class="messages"></div>
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        let connection = null;
        let currentRoom = "";
        let mySymbol = "";
        let myTurn = false;
        let isSpectator = false;

        function debugLog(msg) {
            const debugDiv = document.getElementById("debug");
            const time = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div>[${time}] ${msg}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(msg);
        }

        async function joinGame() {
            currentRoom = document.getElementById("roomId").value;
            if (!currentRoom) {
                alert("Введите ID комнаты");
                return;
            }

            connection = new signalR.HubConnectionBuilder()
                .withUrl("/gameHub")
                .build();

            connection.on("SetSymbol", (symbol) => {
                mySymbol = symbol;
                isSpectator = false;
                debugLog(`Получен символ: ${symbol}`);
                document.getElementById("status").innerHTML = `Вы играете за ${mySymbol}`;
                document.getElementById("spectatorBadge").style.display = "none";
                document.getElementById("resetButton").style.display = "inline-block";
            });

            connection.on("SetSpectator", () => {
                isSpectator = true;
                mySymbol = "";
                debugLog(`Вы подключены в режиме наблюдателя`);
                document.getElementById("status").innerHTML = `👁️ Вы наблюдатель. Вы можете смотреть игру и общаться в чате.`;
                document.getElementById("spectatorBadge").style.display = "inline-block";
                document.getElementById("resetButton").style.display = "none";
            });

            connection.on("PlayerCount", (playerCount, spectatorCount) => {
                debugLog(`Игроков: ${playerCount}/2, Зрителей: ${spectatorCount}`);
                document.getElementById("playersInfo").innerHTML = `Игроков в комнате: ${playerCount}/2 | Зрителей: ${spectatorCount}`;
                if (playerCount === 1 && !isSpectator) {
                    document.getElementById("status").innerHTML = `Вы играете за ${mySymbol}. Ожидание игрока...`;
                } else if (playerCount === 1 && isSpectator) {
                    document.getElementById("status").innerHTML = `👁️ Ожидание второго игрока...`;
                }
            });

            connection.on("GameReady", () => {
                debugLog("Игра готова к запуску!");
                if (!isSpectator) {
                    document.getElementById("status").innerHTML = `Игра началась! Вы играете за ${mySymbol}`;
                } else {
                    document.getElementById("status").innerHTML = `👁️ Игра началась! Вы наблюдаете за игрой`;
                }
            });

            connection.on("BoardUpdate", (board) => {
                debugLog(`Получено обновление поля: ${board.join("|")}`);
                renderBoard(board);
            });

            connection.on("Turn", (player) => {
                debugLog(`Событие Turn: ход игрока ${player}, мой символ ${mySymbol}`);
                if (!isSpectator) {
                    myTurn = (player === mySymbol);
                    if (myTurn) {
                        document.getElementById("status").innerHTML = `✅ ВАШ ХОД! (${mySymbol}) ✅`;
                        debugLog("Это мой ход!");
                        if (window.currentBoard) {
                            renderBoard(window.currentBoard);
                        }
                    } else {
                        document.getElementById("status").innerHTML = `⏳ Ход соперника (${player}) ⏳`;
                        debugLog("Это не мой ход");
                    }
                } else {
                    document.getElementById("status").innerHTML = `👁️ Ход игрока ${player}`;
                }
            });

            connection.on("TurnChanged", (player) => {
                debugLog(`TurnChanged: теперь ходит ${player}`);
            });

            connection.on("GameEnd", (message) => {
                debugLog(`Игра окончена: ${message}`);
                document.getElementById("status").innerHTML = message;
                myTurn = false;
            });

            connection.on("GameReset", () => {
                debugLog("Игра сброшена");
                if (!isSpectator) {
                    document.getElementById("status").innerHTML = `Игра сброшена! Вы играете за ${mySymbol}`;
                } else {
                    document.getElementById("status").innerHTML = `👁️ Игра сброшена!`;
                }
            });

            connection.on("NewMessage", (playerName, message) => {
                debugLog(`Сообщение от ${playerName}: ${message}`);
                let messagesDiv = document.getElementById("messages");
                let msgDiv = document.createElement("div");
                msgDiv.className = `message ${playerName}`;
                msgDiv.innerHTML = `<strong>${playerName}:</strong> ${message}`;
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            connection.on("Error", (error) => {
                debugLog(`ОШИБКА: ${error}`);
                document.getElementById("joinError").innerHTML = error;
                setTimeout(() => {
                    document.getElementById("joinError").innerHTML = "";
                }, 3000);
                alert(error);
            });

            try {
                await connection.start();
                debugLog(`Подключено! ID: ${connection.connectionId}`);
                await connection.invoke("JoinRoom", currentRoom);

                document.getElementById("joinPanel").style.display = "none";
                document.getElementById("gamePanel").style.display = "block";
                document.getElementById("joinError").innerHTML = "";
            } catch (err) {
                debugLog(`Ошибка подключения: ${err}`);
                alert("Ошибка подключения: " + err);
            }
        }

        let currentBoard = [];

        function renderBoard(board) {
            currentBoard = board;
            let boardDiv = document.getElementById("board");
            boardDiv.innerHTML = "";

            for (let i = 0; i < 9; i++) {
                let cell = document.createElement("div");
                cell.className = "cell " + board[i];
                cell.innerHTML = board[i];

                if (!isSpectator && board[i] === "") {
                    cell.onclick = () => makeMove(i);
                    cell.style.cursor = "pointer";
                    cell.style.background = "#90EE90";
                } else if (isSpectator) {
                    cell.style.cursor = "not-allowed";
                    cell.style.opacity = "0.8";
                } else {
                    cell.style.background = "#f9f9f9";
                }

                boardDiv.appendChild(cell);
            }
        }

        async function makeMove(position) {
            if (isSpectator) {
                debugLog("Наблюдатели не могут ходить!");
                return;
            }

            debugLog(`Попытка хода в позицию ${position}, myTurn=${myTurn}`);
            if (!myTurn) {
                debugLog("Ход невозможен - не мой ход!");
                return;
            }
            if (!currentBoard || currentBoard[position] !== "") {
                debugLog("Ход невозможен - клетка уже занята!");
                return;
            }
            await connection.invoke("MakeMove", currentRoom, position);
            debugLog(`Ход отправлен на сервер`);
        }

        async function resetGame() {
            if (isSpectator) {
                debugLog("Наблюдатели не могут сбросить игру!");
                alert("Только игроки могут сбросить игру!");
                return;
            }

            debugLog("Выполняется сброс игры");
            await connection.invoke("ResetGame", currentRoom);
        }

        async function sendMessage() {
            let input = document.getElementById("messageInput");
            let message = input.value;
            if (message) {
                debugLog(`Отправка сообщения: ${message}`);
                await connection.invoke("SendMessage", currentRoom, message);
                input.value = "";
            }
        }
    </script>
</body>
</html>
